name: TestFlight (Nagram)

# Signed release_arm64 build -> upload to TestFlight via altool.
# Runs on GitHub-hosted macos-26 (Apple Silicon, Xcode 26.x, iOS 26 SDK).
#
# Required repository secrets:
#   TELEGRAM_API_ID, TELEGRAM_API_HASH  - Telegram API credentials (my.telegram.org)
#   APPLE_TEAM_ID                       - signing team (Kitta Ltd = 7P8CLHDH5G)
#   ASC_KEY_ID, ASC_ISSUER_ID           - App Store Connect API key id + issuer
#   ASC_KEY_P8_BASE64                   - base64 of AuthKey_<ASC_KEY_ID>.p8
#   DIST_CERT_P12_BASE64                - base64 of the Apple Distribution (Kitta) cert+key .p12
#   DIST_CERT_PASSWORD                  - password for that .p12
#
# Make the cert .p12:  security export is not enough — export from Keychain Access
# (Apple Distribution: Kitta Ltd, "Export... .p12"), then: base64 -i dist.p12 | pbcopy

on:
  workflow_dispatch:
  push:
    branches: [ "release" ]

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-upload:
    runs-on: macos-26
    timeout-minutes: 180
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      # --- from envvars (repository secrets) ---
      TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      APPLE_TEAM_ID:     ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID:        ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:     ${{ secrets.ASC_ISSUER_ID }}
      # --- app identity (not secret) ---
      BUNDLE_ID:   xyz.nextalone.nagram
      APPSTORE_ID: "6781000861"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode 26.x
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC/Contents/Developer"; fi
          xcodebuild -version

      - name: Install Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Cache Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/telegram-bazel-cache
          key: bazel-disk-${{ hashFiles('versions.json', 'MODULE.bazel.lock') }}
          restore-keys: bazel-disk-

      - name: Import distribution certificate
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD:   ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPWD="$(uuidgen)"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -k "$KPWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/dist.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Set up App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Write build configuration
        run: |
          set -euo pipefail
          : "${TELEGRAM_API_ID:?missing}" "${TELEGRAM_API_HASH:?missing}" "${APPLE_TEAM_ID:?missing}"
          mkdir -p build-input
          cat > build-input/local-configuration.json <<JSON
          {
              "bundle_id": "${BUNDLE_ID}",
              "api_id": "${TELEGRAM_API_ID}",
              "api_hash": "${TELEGRAM_API_HASH}",
              "team_id": "${APPLE_TEAM_ID}",
              "app_center_id": "0",
              "is_internal_build": "false",
              "is_appstore_build": "true",
              "appstore_id": "${APPSTORE_ID}",
              "app_specific_url_scheme": "tg",
              "premium_iap_product_id": "",
              "enable_siri": false,
              "enable_icloud": false
          }
          JSON

      - name: Write local.bazelrc (app + extensions + Xcode 26.x deprecation demotion)
        run: |
          cat > local.bazelrc <<'RC'
          build --copt=-Wno-error
          build --cxxopt=-Wno-error
          build --objccopt=-Wno-error
          build --per_file_copt=.*\.m$@-Wno-error=deprecated-declarations
          build --per_file_copt=.*\.mm$@-Wno-error=deprecated-declarations
          build --@build_bazel_rules_swift//swift:copt=-no-warnings-as-errors
          RC

      - name: Generate App Store provisioning profiles
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          kid = os.environ["ASC_KEY_ID"]
          p = os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{kid}.p8")
          json.dump({"key_id": kid, "issuer_id": os.environ["ASC_ISSUER_ID"],
                     "key": open(p).read(), "in_house": False}, open("/tmp/asc_key.json", "w"))
          PY
          chmod 600 /tmp/asc_key.json
          mkdir -p build-input/codesigning/profiles

          while IFS=: read -r suffix filename; do
            identifier="${BUNDLE_ID}${suffix}"
            fastlane sigh --api_key_path /tmp/asc_key.json --app_identifier "$identifier" \
              --platform ios --force \
              --output_path build-input/codesigning/profiles --filename "$filename"
          done <<'PROFILES'
          :Telegram.mobileprovision
          .Share:Share.mobileprovision
          .NotificationContent:NotificationContent.mobileprovision
          .NotificationService:NotificationService.mobileprovision
          .SiriIntents:Intents.mobileprovision
          .Widget:Widget.mobileprovision
          .BroadcastUpload:BroadcastUpload.mobileprovision
          PROFILES
          rm -f /tmp/asc_key.json

      - name: Force iOS 15 deployment target
        run: |
          sed -i '' 's/minimum_os_version = "[^"]*"/minimum_os_version = "15.0"/g' Telegram/BUILD

      - name: Build (release_arm64, signed)
        run: |
          set -euo pipefail
          BUILD_NUMBER="$(( $(git rev-list --count HEAD) + $(cat build_number_offset 2>/dev/null || echo 0) ))"
          echo "Build number: $BUILD_NUMBER"
          python3 build-system/Make/Make.py --overrideXcodeVersion \
            --cacheDir "$HOME/telegram-bazel-cache" \
            build \
            --configurationPath build-input/local-configuration.json \
            --codesigningInformationPath build-input/codesigning \
            --buildNumber="$BUILD_NUMBER" \
            --configuration=release_arm64

      - name: Upload to TestFlight
        env:
          USES_NON_EXEMPT_ENCRYPTION: ${{ vars.USES_NON_EXEMPT_ENCRYPTION || 'false' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          kid = os.environ["ASC_KEY_ID"]
          p = os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{kid}.p8")
          json.dump({"key_id": kid, "issuer_id": os.environ["ASC_ISSUER_ID"],
                     "key": open(p).read(), "in_house": False}, open("/tmp/asc_key.json", "w"))
          PY
          chmod 600 /tmp/asc_key.json
          # Upload only — do not distribute yet. Separating upload from distribution
          # avoids BETA_CONTRACT_MISSING aborting the upload when the Beta Testing
          # Agreement hasn't been accepted yet, or when the group is mis-configured.
          fastlane pilot upload \
            --api_key_path /tmp/asc_key.json \
            --ipa bazel-bin/Telegram/Telegram.ipa \
            --app_identifier "$BUNDLE_ID" \
            --skip_submission true \
            --uses_non_exempt_encryption "$USES_NON_EXEMPT_ENCRYPTION"
          rm -f /tmp/asc_key.json

      - name: Distribute to external TestFlight group
        env:
          # Repository VARIABLES (Settings -> Secrets and variables -> Actions -> Variables):
          #   TESTFLIGHT_GROUPS  - name of the EXTERNAL group in App Store Connect (must already exist)
          TESTFLIGHT_GROUPS: ${{ vars.TESTFLIGHT_GROUPS }}
          APPSTORE_ID: "6781000861"
        run: |
          set -euo pipefail
          : "${TESTFLIGHT_GROUPS:?set the TESTFLIGHT_GROUPS repository variable to your external group name}"
          # Use the ASC REST API to find the processed build and add it to the external
          # group — avoids re-uploading the IPA and decouples distribution from upload,
          # so BETA_CONTRACT_MISSING or group misconfig cannot abort the upload step.
          python3 - <<'PY'
          import os, sys, time, json, base64, urllib.request, urllib.error, subprocess
          from cryptography.hazmat.primitives.serialization import load_pem_private_key
          from cryptography.hazmat.primitives.asymmetric.ec import ECDSA
          from cryptography.hazmat.primitives.hashes import SHA256
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature

          kid    = os.environ["ASC_KEY_ID"]
          issuer = os.environ["ASC_ISSUER_ID"]
          app_id = os.environ["APPSTORE_ID"]
          group_name = os.environ["TESTFLIGHT_GROUPS"]
          offset = int(open("build_number_offset").read().strip()) if os.path.exists("build_number_offset") else 0
          commit_count = int(subprocess.check_output(["git", "rev-list", "--count", "HEAD"]).strip())
          build_number = str(commit_count + offset)
          key = load_pem_private_key(
              open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{kid}.p8")).read().encode(),
              password=None)

          def tok():
              hdr = base64.urlsafe_b64encode(json.dumps({"alg":"ES256","kid":kid,"typ":"JWT"}).encode()).rstrip(b"=")
              now = int(time.time())
              pay = base64.urlsafe_b64encode(json.dumps({"iss":issuer,"iat":now,"exp":now+600,"aud":"appstoreconnect-v1"}).encode()).rstrip(b"=")
              msg = hdr + b"." + pay
              sig = key.sign(msg, ECDSA(SHA256()))
              r, s = decode_dss_signature(sig)
              return (msg + b"." + base64.urlsafe_b64encode(r.to_bytes(32,"big")+s.to_bytes(32,"big")).rstrip(b"=")).decode()

          def api(method, path, body=None):
              req = urllib.request.Request("https://api.appstoreconnect.apple.com" + path,
                    method=method, headers={"Authorization": f"Bearer {tok()}", "Content-Type": "application/json"})
              if body: req.data = json.dumps(body).encode()
              try:
                  with urllib.request.urlopen(req) as r: return r.status, json.loads(r.read())
              except urllib.error.HTTPError as e: return e.code, {"_body": e.read().decode()}

          # 1. Find the build (wait up to 30 min for processing)
          build_id = None
          for attempt in range(36):
              s, r = api("GET", f"/v1/builds?filter[app]={app_id}&filter[version]={build_number}"
                                "&filter[processingState]=VALID&sort=-uploadedDate&limit=1")
              data = r.get("data", [])
              if data:
                  build_id = data[0]["id"]
                  print(f"Build found: {build_id} (build {build_number})")
                  break
              print(f"Waiting for build {build_number} to finish processing ({attempt+1}/36)...")
              time.sleep(50)
          if not build_id:
              print("ERROR: build not found after 30 minutes", file=sys.stderr); sys.exit(1)

          # 2. Find the external beta group by name
          s, r = api("GET", f"/v1/apps/{app_id}/betaGroups?filter[isInternalGroup]=false")
          groups = [g for g in r.get("data", []) if g["attributes"]["name"] == group_name]
          if not groups:
              print(f"ERROR: external group '{group_name}' not found", file=sys.stderr); sys.exit(1)
          group_id = groups[0]["id"]
          print(f"Group: {group_name} ({group_id})")

          # 3. Add build to group (triggers Beta App Review + notifies testers)
          s, r = api("POST", f"/v1/betaGroups/{group_id}/relationships/builds",
                     {"data": [{"type": "builds", "id": build_id}]})
          if s in (200, 201, 204, 409):
              print(f"Distributed build {build_id} to group '{group_name}' (status {s})")
          else:
              print(f"ERROR distributing: {s} {r.get('_body','')}", file=sys.stderr); sys.exit(1)
          PY
